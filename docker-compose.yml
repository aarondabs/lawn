services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: lawn-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - lawn-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lawn-internal
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lawn-api
    environment:
      APP_ENV: ${APP_ENV}
      APP_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      RACHIO_API_KEY: ${RACHIO_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - homelab
      - lawn-internal
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lawn-web
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${WEB_PORT}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    networks:
      - homelab
      - lawn-internal
    restart: unless-stopped

networks:
  homelab:
    external: true
  lawn-internal:
    driver: bridge

volumes:
  lawn-db-data:
