# DEVELOPMENT overrides — always layer on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# What this does vs production:
#   - Exposes db on host port 5433 for direct psql / test runner access
#   - Mounts api/src, api/tests, api/alembic into the container (hot-reload via uvicorn --reload)
#   - Mounts the entire web/ directory and runs `npm run dev` with hot-reload
#   - Exposes api on port 8000 and web on port 3001 for direct browser access
#   - Adds api-test service (pytest + source-mounted) for running the test suite
#
# Tests: ./ops/test.sh  (first-time: ./ops/init-test-db.sh)

services:
  db:
    ports:
      - "5433:5432"

  api:
    environment:
      APP_ENV: development
    command: uvicorn lawn_api.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - /opt/apps/lawn/api/src:/app/src
      - /opt/apps/lawn/api/tests:/app/tests
      - /opt/apps/lawn/api/alembic:/app/alembic
      - /opt/apps/lawn/api/alembic.ini:/app/alembic.ini
      # pyproject holds live config (ruff, pytest asyncio_mode). Mount it so config changes take
      # effect without an image rebuild, like source changes do.
      - /opt/apps/lawn/api/pyproject.toml:/app/pyproject.toml
    ports:
      - "8000:8000"

  web:
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    working_dir: /app
    environment:
      NODE_ENV: development
      # Allow the reverse-proxy hostname to reach `next dev` cross-origin. Real value in .env;
      # empty is fine for localhost-only development.
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS:-}
    volumes:
      - /opt/apps/lawn/web:/app
    ports:
      - "3001:3000"

  # Run with: ./ops/test.sh  (or docker compose run --rm api-test python -m pytest -q)
  # Source is volume-mounted so no rebuild is needed after code changes.
  # First-time setup: run ops/init-test-db.sh once to create lawn_test.
  api-test:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/lawn_test
    volumes:
      - /opt/apps/lawn/api/src:/app/src
      - /opt/apps/lawn/api/tests:/app/tests
      - /opt/apps/lawn/api/alembic:/app/alembic
      - /opt/apps/lawn/api/alembic.ini:/app/alembic.ini
      # See the api service: pyproject holds live pytest/ruff config.
      - /opt/apps/lawn/api/pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lawn-internal
